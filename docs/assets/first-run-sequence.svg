    <text x="26" y="82" fill="#FFF7EB" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">1. Install</text>
    <text x="26" y="110" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">Run the Windows installer</text>
    <text x="26" y="132" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">and launch PDF Toolkit</text>
    <rect x="26" y="144" width="116" height="12" rx="6" fill="#21404E"/>
  </g>

  <g transform="translate(338 182)">
    <rect width="252" height="170" rx="18" fill="#10222D" stroke="#21404E"/>
    <circle cx="42" cy="40" r="18" fill="#59B7A7"/>
    <path d="M34 40h16" stroke="#071017" stroke-width="4" stroke-linecap="round"/>
    <text x="26" y="82" fill="#FFF7EB" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">2. Start Here</text>
    <text x="26" y="110" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">Pick a workflow template</text>
    <text x="26" y="132" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">with sane defaults</text>
    <rect x="26" y="144" width="164" height="12" rx="6" fill="#21404E"/>
  </g>

  <g transform="translate(624 182)">
    <rect width="252" height="170" rx="18" fill="#10222D" stroke="#21404E"/>
    <circle cx="42" cy="40" r="18" fill="#F0B96A"/>
    <path d="M35 44l6-8 8 10 10-16" stroke="#071017" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="26" y="82" fill="#FFF7EB" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">3. Run Task</text>
    <text x="26" y="110" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">Confirm inputs and outputs,</text>
    <text x="26" y="132" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">then execute locally</text>
    <rect x="26" y="144" width="134" height="12" rx="6" fill="#21404E"/>
  </g>

  <g transform="translate(910 182)">
    <rect width="236" height="170" rx="18" fill="#10222D" stroke="#21404E"/>
