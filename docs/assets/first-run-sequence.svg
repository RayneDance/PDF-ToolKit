<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <rect width="1200" height="420" rx="28" fill="#071017"/>
  <rect x="24" y="24" width="1152" height="372" rx="22" fill="#0B1720" stroke="#17303C"/>
  <text x="58" y="70" fill="#F0B96A" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="3">FIRST-RUN FLOW</text>
  <text x="58" y="108" fill="#FFF7EB" font-family="Bahnschrift, Segoe UI, sans-serif" font-size="34" font-weight="700">Install, choose a template, run, and find the output</text>
  <text x="58" y="138" fill="#97A8AB" font-family="Segoe UI, sans-serif" font-size="18">A Windows-first desktop workflow for repeatable PDF jobs. No account wall. No cloud setup required.</text>

  <g transform="translate(52 182)">
    <rect width="252" height="170" rx="18" fill="#10222D" stroke="#21404E"/>
    <circle cx="42" cy="40" r="18" fill="#E08B49"/>
