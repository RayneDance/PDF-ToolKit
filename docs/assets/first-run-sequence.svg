    <text x="26" y="110" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">Open the file, output folder,</text>
    <text x="26" y="132" fill="#C6D6D9" font-family="Segoe UI, sans-serif" font-size="16">or rerun from recent history</text>
